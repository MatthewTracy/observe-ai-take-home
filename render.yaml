services:
  - type: web
    name: observe-insurance-voice-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AIRTABLE_PAT
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: AIRTABLE_CALLERS_TABLE
        value: Callers
      - key: AIRTABLE_INTERACTIONS_TABLE
        value: Interactions
      - key: VAPI_API_KEY
        sync: false
